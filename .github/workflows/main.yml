name: ChronoFlow CI/CD Pipeline
run-name: Deploy to ${{ inputs.environment || 'dev' }} triggered by ${{ github.actor }}

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target Environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, prod]

permissions:
  contents: read
  actions: read
  pull-requests: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PROJECT_NAME: "chronoflow"
  COST_CENTER: "cf-01"
  FIREBASE_PROJECT_ID: "chronoflow-474410"
  CI: true

jobs:
  # ====================================================
  # PHASE 1: Type Verification
  # ====================================================
  typecheck:
    name: "Type Verification"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  # ====================================================
  # PHASE 2: Unit & Integration Tests (NON-BLOCKING)
  # ====================================================
  test:
    name: "Unit & Integration Tests (non-blocking)"
    runs-on: ubuntu-latest
    needs: typecheck
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Execute Vitest
        run: npm run test:ci:unit
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ====================================================
  # PHASE 3: Code Quality & Security
  # ====================================================
  lint:
    name: "ESLint Analysis"
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json
          if-no-files-found: ignore

  semgrep:
    name: "SAST (Semgrep)"
    runs-on: ubuntu-latest
    needs: typecheck
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep
      - name: Semgrep Scan with Reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/secrets \
            --include 'src/**/*.ts' --include 'src/**/*.tsx' \
            --metrics=off \
            --sarif \
            | reviewdog -f=sarif -name="Semgrep" -reporter=github-pr-review -filter-mode=nofilter -fail-on-error=false -level=warning
      - name: Semgrep Scan (Artifact Generation)
        if: always()
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/secrets \
            --include 'src/**/*.ts' --include 'src/**/*.tsx' \
            --metrics=off \
            --sarif --output semgrep.sarif \
            || true
      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results-${{ github.run_id }}
          path: semgrep.sarif
          if-no-files-found: ignore

  sca:
    name: "SCA (Trivy)"
    runs-on: ubuntu-latest
    needs: typecheck
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare output directory
        run: mkdir -p .reports

      - name: Pull Trivy image
        run: docker pull aquasec/trivy:0.65.0

      - name: Run Trivy - generate SARIF report
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD":/workspace \
            -w /workspace \
            aquasec/trivy:0.65.0 fs \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --format sarif \
            --output .reports/trivy-results.sarif \
            .

      - name: Upload SARIF to GitHub Security tab
        if: always() && hashFiles('.reports/trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .reports/trivy-results.sarif
          category: trivy-sca

      - name: Enforce - fail on CRITICAL/HIGH vulnerabilities
        run: |
          docker run --rm \
            -v "$PWD":/workspace \
            -w /workspace \
            aquasec/trivy:0.65.0 fs \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            .

      - name: Upload Trivy artifact
        if: always() && hashFiles('.reports/trivy-results.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-${{ github.run_id }}
          path: .reports/trivy-results.sarif
          retention-days: 7
  

  dependency-review:
    name: "Dependency Review"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always

  secret-scan:
    name: "Secret Scanning (TruffleHog)"
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          base: ""
          head: ${{ github.ref }}
          extra_args: --debug --only-verified

  # ====================================================
  # PHASE 4: Build & Optimize
  # ====================================================
  build:
    name: "Build & Optimize"
    needs: [typecheck, lint, semgrep, sca, secret-scan]
    runs-on: ubuntu-latest
    outputs:
      build-hash: ${{ steps.hash.outputs.hash }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Set Build Environment
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          echo "VITE_ENV=${ENV}" >> "$GITHUB_ENV"
          echo "Building for environment: ${ENV}"

      - name: Build Application
        run: npm run build
        env:
          NODE_ENV: production
          GENERATE_SOURCEMAP: true
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Verify dist exists
        run: |
          test -d dist
          find dist -maxdepth 2 -type f | sort | head -100

      - name: Generate Build Hash
        id: hash
        run: |
          BUILD_HASH=$(find dist -type f -exec md5sum {} \; | sort | md5sum | cut -d' ' -f1)
          echo "hash=${BUILD_HASH}" >> "$GITHUB_OUTPUT"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
          compression-level: 9

  # ====================================================
  # PHASE 5: E2E & DAST (against local preview server)
  # ====================================================
  # e2e:
  #   name: "Playwright E2E Tests"
  #   needs: build
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: ${{ env.NODE_VERSION }}
  #         cache: "npm"
  #     - run: npm ci
  #     - uses: actions/download-artifact@v4
  #       with:
  #         name: dist-${{ github.sha }}
  #         path: dist
  #     - run: npx playwright install --with-deps
  #     - run: npm run test:ci:e2e
  #     - name: Upload Playwright Report
  #       if: always()
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: playwright-report
  #         path: playwright-report/
  #         retention-days: 20

  dast:
    name: "DAST (OWASP ZAP)"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
      - name: Start preview server
        run: |
          npx vite preview --host 127.0.0.1 --port 5173 --strictPort &
          echo $! > web_pid
      - run: npx wait-on http-get://127.0.0.1:5173
      - run: chmod -R a+w .
      - name: Execute OWASP ZAP Baseline Scan
        continue-on-error: true
        env:
          TARGET_URL: "http://127.0.0.1:5173"
        run: |
          set -euo pipefail
          docker pull ghcr.io/zaproxy/zaproxy:stable -q
          set +e
          docker run --rm \
            -v "$PWD":/zap/wrk/:rw \
            -w /zap/wrk \
            --network host \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t "$TARGET_URL" \
              -J report_json.json \
              -w report_md.md \
              -r report_html.html \
              -j \
              -m 5 \
              -c ".zap/rules.tsv"
          EXIT_CODE=$?
          set -e
          echo "ZAP scan completed with exit code: $EXIT_CODE"
      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report-${{ github.run_id }}
          path: |
            report_html.html
            report_md.md
            report_json.json
      - name: Stop preview server
        if: always()
        run: kill $(cat web_pid) || true

  # ====================================================
  # PHASE 6: Firebase Hosting Deploy
  # ====================================================
  firebase-preview:
    name: "Firebase Hosting – Preview Channel"
    if: github.event_name == 'pull_request'
    needs: [dast]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Debug auth context
        run: |
          gcloud auth list
          gcloud config list
          gcloud projects describe "${{ env.FIREBASE_PROJECT_ID }}" --format="value(projectId,name,projectNumber)"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}"
          echo "GOOGLE_GHA_CREDS_PATH=${GOOGLE_GHA_CREDS_PATH}"

      - name: Verify firebase CLI can see project
        run: npx firebase-tools projects:list --debug

      - name: Deploy preview channel
        run: |
          firebase hosting:channel:deploy pr-${{ github.event.number }} \
            --project "${{ env.FIREBASE_PROJECT_ID }}" \
            --expires 7d \
            --non-interactive \
            --debug

  firebase-live:
    name: "Firebase Hosting – Live Deploy"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [dast]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Debug auth context
        run: |
          gcloud auth list
          gcloud config list
          gcloud projects describe "${{ env.FIREBASE_PROJECT_ID }}" --format="value(projectId,name,projectNumber)"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}"
          echo "GOOGLE_GHA_CREDS_PATH=${GOOGLE_GHA_CREDS_PATH}"

      - name: Verify firebase CLI can see project
        run: npx firebase-tools projects:list --debug

      - name: Deploy to live channel
        run: firebase deploy --only hosting --project "${{ env.FIREBASE_PROJECT_ID }}" --non-interactive --debug

  # ====================================================
  # PHASE 7: GCS Bucket Deploy
  # ====================================================
  gcs-deploy:
    name: "GCS Deploy – chronoflow-frontend-dev"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [dast]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Sync dist to GCS bucket
        run: |
          gsutil -m rsync -r -d dist/ gs://chronoflow-frontend-dev/

      - name: Set cache headers for hashed assets
        if: always()
        run: |
          gsutil -m setmeta -h "Cache-Control: public, max-age=31536000, immutable" gs://chronoflow-frontend-dev/assets/** || true

      - name: Set cache headers for HTML entry
        if: always()
        run: |
          gsutil -m setmeta -h "Cache-Control: public, max-age=0, must-revalidate" gs://chronoflow-frontend-dev/index.html || true